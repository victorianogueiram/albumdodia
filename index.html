<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Álbum do Dia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0f0f0f;
    --ink-2: #5a5a5a;
    --ink-3: #aaaaaa;
    --paper: #faf9f7;
    --paper-2: #f2f0ec;
    --paper-3: #e8e5df;
    --accent: #1a1a1a;
    --line: rgba(0,0,0,0.08);
    --radius: 4px;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  html { font-size: 16px; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
  }
  .nav-brand {
    font-family: var(--serif);
    font-size: 1.1rem;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
  }
  .nav-tabs { display: flex; gap: 0; }
  .nav-tab {
    background: none; border: none;
    font-family: var(--sans); font-size: 13px; font-weight: 400;
    color: var(--ink-3); cursor: pointer;
    padding: 0 1rem; height: 56px;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .nav-tab:hover { color: var(--ink-2); }
  .nav-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }

  /* PAGES */
  .page { display: none; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* TODAY PAGE */
  .today-wrap {
    max-width: 560px; margin: 0 auto;
    padding: 4rem 2rem 6rem;
  }
  .today-date {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 3rem;
  }
  .today-label {
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 1rem;
  }
  .album-genre-tag {
    display: inline-block;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid var(--paper-3);
    padding: 3px 10px; border-radius: 2px;
    color: var(--ink-2); margin-bottom: 1.5rem;
  }
  .album-title {
    font-family: var(--serif);
    font-size: clamp(2rem, 6vw, 3.2rem);
    line-height: 1.1; letter-spacing: -0.02em;
    color: var(--ink); margin-bottom: 0.5rem;
  }
  .album-artist {
    font-size: 1.1rem; font-weight: 400;
    color: var(--ink-2); margin-bottom: 0.25rem;
  }
  .album-year {
    font-size: 13px; color: var(--ink-3);
    margin-bottom: 3rem;
  }
  .divider { height: 1px; background: var(--line); margin: 2.5rem 0; }

  /* RATING */
  .rating-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 1rem; }
  .stars { display: flex; gap: 6px; margin-bottom: 2.5rem; }
  .star {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid var(--paper-3);
    background: none; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    color: var(--ink-3);
  }
  .star:hover { transform: scale(1.1); }
  .star.on { background: var(--ink); border-color: var(--ink); color: var(--paper); }

  /* NOTES */
  .notes-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 0.75rem; }
  .notes-area {
    width: 100%; min-height: 120px;
    background: transparent;
    border: none; border-bottom: 1px solid var(--line);
    font-family: var(--sans); font-size: 15px; font-weight: 300; line-height: 1.7;
    color: var(--ink); resize: none; outline: none;
    padding: 0.25rem 0 1rem;
    transition: border-color 0.15s;
  }
  .notes-area::placeholder { color: var(--ink-3); }
  .notes-area:focus { border-bottom-color: var(--ink-2); }

  .save-btn {
    margin-top: 1.5rem;
    background: var(--ink); color: var(--paper);
    border: none; font-family: var(--sans); font-size: 13px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 12px 28px; border-radius: var(--radius);
    cursor: pointer; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.8; }
  .save-btn:active { opacity: 0.6; }
  .save-status { font-size: 12px; color: var(--ink-3); margin-top: 0.75rem; height: 18px; }

  .streaming-btns { display: flex; gap: 10px; margin-bottom: 2.5rem; flex-wrap: wrap; }
  .streaming-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; border-radius: var(--radius);
    border: 1px solid var(--paper-3);
    background: var(--paper-2);
    font-family: var(--sans); font-size: 13px; font-weight: 400;
    color: var(--ink-2); text-decoration: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .streaming-btn:hover { border-color: var(--ink-3); color: var(--ink); background: var(--paper-3); }
  .streaming-btn svg { flex-shrink: 0; }

  .already-rated {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-3);
    background: var(--paper-2); border-radius: var(--radius);
    padding: 4px 10px; margin-bottom: 1.5rem;
  }
  .already-rated::before { content: '✓'; font-size: 10px; }

  .skip-btn {
    background: none; border: 1px solid var(--paper-3);
    font-family: var(--sans); font-size: 13px; font-weight: 400;
    color: var(--ink-3); padding: 8px 18px; border-radius: var(--radius);
    cursor: pointer; transition: all 0.15s; margin-top: 2rem;
    display: block;
  }
  .skip-btn:hover { color: var(--ink-2); border-color: var(--ink-3); }
  .skip-count { font-size: 11px; color: var(--ink-3); margin-top: 0.5rem; letter-spacing: 0.03em; }

  /* HISTORY PAGE */
  .history-wrap {
    max-width: 760px; margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }
  .history-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 2.5rem;
  }
  .history-title { font-family: var(--serif); font-size: 1.8rem; letter-spacing: -0.02em; }
  .history-count { font-size: 13px; color: var(--ink-3); }

  .history-list { display: flex; flex-direction: column; gap: 0; }
  .history-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    align-items: start;
    gap: 0 1.5rem;
    padding: 1.25rem 0;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background 0.1s;
  }
  .history-item:hover { background: var(--paper-2); margin: 0 -1rem; padding-left: 1rem; padding-right: 1rem; border-radius: var(--radius); }
  .history-item-date { font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); padding-top: 3px; }
  .history-item-info {}
  .history-item-title { font-family: var(--serif); font-size: 1.05rem; line-height: 1.2; margin-bottom: 2px; }
  .history-item-artist { font-size: 13px; color: var(--ink-2); }
  .history-item-note { font-size: 12px; color: var(--ink-3); margin-top: 4px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .history-item-rating { display: flex; gap: 2px; padding-top: 2px; }
  .mini-star { font-size: 11px; color: var(--ink-3); }
  .mini-star.on { color: var(--ink); }
  .unrated-tag { font-size: 11px; color: var(--ink-3); font-style: italic; }

  .empty-history {
    text-align: center; padding: 5rem 0;
    color: var(--ink-3); font-size: 14px; line-height: 2;
  }
  .empty-history strong { display: block; font-family: var(--serif); font-size: 1.4rem; color: var(--ink-2); margin-bottom: 0.5rem; }

  /* ALL ALBUMS PAGE */
  .all-wrap {
    max-width: 960px; margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }
  .all-header { margin-bottom: 2rem; }
  .all-header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; }
  .all-title { font-family: var(--serif); font-size: 1.8rem; letter-spacing: -0.02em; }
  .search-input {
    width: 100%; background: transparent;
    border: none; border-bottom: 1px solid var(--line);
    font-family: var(--sans); font-size: 14px; font-weight: 300;
    color: var(--ink); outline: none; padding: 0.5rem 0;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--ink-3); }
  .search-input:focus { border-bottom-color: var(--ink-2); }
  .genre-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 1rem; }
  .gf-btn {
    background: none; border: 1px solid var(--paper-3);
    font-family: var(--sans); font-size: 11px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-3); padding: 5px 14px; border-radius: 2px;
    cursor: pointer; transition: all 0.12s;
  }
  .gf-btn:hover { color: var(--ink-2); border-color: var(--ink-3); }
  .gf-btn.active { color: var(--ink); border-color: var(--ink); background: var(--ink); color: var(--paper); }

  .albums-table { width: 100%; border-collapse: collapse; }
  .albums-table th {
    text-align: left; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 400; padding: 0 0 0.75rem;
    border-bottom: 1px solid var(--line);
  }
  .albums-table td { padding: 0.75rem 0; border-bottom: 1px solid var(--line); font-size: 14px; vertical-align: middle; }
  .albums-table tr:hover td { background: var(--paper-2); }
  .albums-table td:first-child { color: var(--ink-3); font-size: 11px; width: 40px; }
  .td-title { font-weight: 400; color: var(--ink); }
  .td-artist { color: var(--ink-2); }
  .td-year { color: var(--ink-3); font-size: 12px; width: 50px; }
  .td-genre { width: 80px; }
  .genre-pill {
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 2px; font-weight: 400;
  }
  .gp-pop { background: #FBEAF0; color: #993556; }
  .gp-rock { background: #FCEBEB; color: #A32D2D; }
  .gp-poprock { background: #FAEEDA; color: #854F0B; }
  .gp-rb { background: #E6F1FB; color: #185FA5; }
  .gp-kpop { background: #EEEDFE; color: #534AB7; }
  .td-status { width: 80px; text-align: right; }
  .rated-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink); display: inline-block; }
  .all-count { font-size: 12px; color: var(--ink-3); margin-bottom: 1rem; }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--paper); width: 480px; max-width: 92vw;
    border-radius: 6px; padding: 2.5rem;
    animation: modalIn 0.18s ease;
    position: relative;
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.97) translateY(8px); } to { opacity:1; transform:none; } }
  .modal-close {
    position: absolute; top: 1rem; right: 1.25rem;
    background: none; border: none; font-size: 1.2rem; cursor: pointer;
    color: var(--ink-3); line-height: 1;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-date { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 1.25rem; }
  .modal-title { font-family: var(--serif); font-size: 1.6rem; line-height: 1.15; margin-bottom: 0.25rem; }
  .modal-artist { font-size: 14px; color: var(--ink-2); margin-bottom: 1.5rem; }
  .modal-stars { display: flex; gap: 4px; margin-bottom: 1.25rem; }
  .modal-star { font-size: 18px; color: var(--ink-3); }
  .modal-star.on { color: var(--ink); }
  .modal-notes { font-size: 14px; color: var(--ink-2); line-height: 1.7; font-style: italic; }
  .modal-no-notes { font-size: 13px; color: var(--ink-3); font-style: italic; }
</style>
</head>

<!-- MODAL -->

];

const GENRE_LABELS = {pop:"Pop",rock:"Rock",poprock:"Pop Rock",rb:"R&B",kpop:"K-Pop"};
const GENRE_CLASSES = {pop:"gp-pop",rock:"gp-rock",poprock:"gp-poprock",rb:"gp-rb",kpop:"gp-kpop"};
const STORAGE_KEY = "albumdodia_v1";
const DEVICE_ID_KEY = "albumdodia_deviceid";

function getDateStr(d) {
  return d.toISOString().slice(0,10);
}

// Deterministic hash: combines deviceId + dateStr → index
function seededHash(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) {
    h ^= str.charCodeAt(i);
    h = (h * 16777619) >>> 0;
  }
  return h;
}

function getOrCreateDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = Array.from(crypto.getRandomValues(new Uint8Array(12)))
      .map(b => b.toString(16).padStart(2,'0')).join('');
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

function getDayIndex(dateStr) {
  const deviceId = getOrCreateDeviceId();
  const seed = deviceId + "|" + dateStr;
  return seededHash(seed) % ALBUMS.length;
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

// skips: { "2025-05-13": [idx1, idx2, ...] }
const SKIP_KEY = "albumdodia_skips";
function loadSkips() {
  try { return JSON.parse(localStorage.getItem(SKIP_KEY)) || {}; } catch { return {}; }
}
function saveSkips(s) {
  localStorage.setItem(SKIP_KEY, JSON.stringify(s));
}

const today = new Date();
const todayStr = getDateStr(today);

// Returns the current album index for today, accounting for skips
function getTodayAlbum() {
  const skips = loadSkips();
  const skippedToday = skips[todayStr] || [];
  let attempt = 0;
  while (attempt < ALBUMS.length) {
    const deviceId = getOrCreateDeviceId();
    const seed = deviceId + "|" + todayStr + "|skip" + attempt;
    const idx = seededHash(seed) % ALBUMS.length;
    if (!skippedToday.includes(idx)) return { album: ALBUMS[idx], idx };
    attempt++;
  }
  // Fallback: all albums skipped, just return the base one
  const deviceId = getOrCreateDeviceId();
  const idx = seededHash(deviceId + "|" + todayStr + "|skip0") % ALBUMS.length;
  return { album: ALBUMS[idx], idx };
}

let data = loadData();
let currentRating = 0;
let todayAlbum, todayIdx;

function formatDatePT(str) {
  const [y,m,d] = str.split("-");
  const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
}

function renderTodayPage() {
  const result = getTodayAlbum();
  todayAlbum = result.album;
  todayIdx = result.idx;
  currentRating = 0;

  document.getElementById("today-date").textContent = formatDatePT(todayStr).toUpperCase();
  document.getElementById("album-title").textContent = todayAlbum.title;
  document.getElementById("album-artist").textContent = todayAlbum.artist;
  document.getElementById("album-year").textContent = todayAlbum.year;
  document.getElementById("album-genre").textContent = GENRE_LABELS[todayAlbum.genre];

  const q = encodeURIComponent(todayAlbum.title + " " + todayAlbum.artist);
  document.getElementById("spotify-btn").href = `https://open.spotify.com/search/${q}`;
  document.getElementById("apple-btn").href = `https://music.apple.com/search?term=${q}`;

  const existing = data[todayStr + "|" + todayIdx] || data[todayStr];
  if (existing && existing.album && existing.album.title === todayAlbum.title) {
    currentRating = existing.rating || 0;
    document.getElementById("notes").value = existing.notes || "";
    document.getElementById("already-rated-msg").style.display = "inline-flex";
  } else {
    document.getElementById("notes").value = "";
    document.getElementById("already-rated-msg").style.display = "none";
  }

  renderStars(document.getElementById("stars"), currentRating, true);

  const skips = loadSkips();
  const skipCount = (skips[todayStr] || []).length;
  const skipCountEl = document.getElementById("skip-count");
  if (skipCount > 0) {
    skipCountEl.textContent = `${skipCount} álbum${skipCount > 1 ? "s" : ""} pulado${skipCount > 1 ? "s" : ""} hoje`;
  } else {
    skipCountEl.textContent = "";
  }
  document.getElementById("save-status").textContent = "";
}

renderTodayPage();

function renderStars(container, rating, interactive) {
  container.innerHTML = "";
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement("button");
    btn.className = "star" + (i <= rating ? " on" : "");
    btn.textContent = i <= rating ? "★" : "☆";
    if (interactive) {
      btn.addEventListener("mouseenter", () => {
        container.querySelectorAll(".star").forEach((s,j) => {
          s.className = "star" + (j < i ? " on" : "");
          s.textContent = j < i ? "★" : "☆";
        });
      });
      btn.addEventListener("mouseleave", () => {
        container.querySelectorAll(".star").forEach((s,j) => {
          s.className = "star" + (j < currentRating ? " on" : "");
          s.textContent = j < currentRating ? "★" : "☆";
        });
      });
      btn.addEventListener("click", () => {
        currentRating = currentRating === i ? 0 : i;
        renderStars(container, currentRating, true);
      });
    }
    container.appendChild(btn);
  }
}

document.getElementById("save-btn").addEventListener("click", () => {
  const notes = document.getElementById("notes").value.trim();
  data = loadData();
  data[todayStr + "|" + todayIdx] = { album: todayAlbum, rating: currentRating, notes, date: todayStr };
  saveData(data);
  document.getElementById("already-rated-msg").style.display = "inline-flex";
  const st = document.getElementById("save-status");
  st.textContent = "Salvo!";
  setTimeout(() => st.textContent = "", 2000);
});

document.getElementById("skip-btn").addEventListener("click", () => {
  const skips = loadSkips();
  if (!skips[todayStr]) skips[todayStr] = [];
  if (!skips[todayStr].includes(todayIdx)) skips[todayStr].push(todayIdx);
  saveSkips(skips);
  renderTodayPage();
});

// NAV
document.querySelectorAll(".nav-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById("page-" + tab.dataset.page).classList.add("active");
    if (tab.dataset.page === "history") renderHistory();
    if (tab.dataset.page === "all") renderAll();
  });
});

// HISTORY
function renderHistory() {
  data = loadData();
  const entries = Object.values(data)
    .filter(e => e && e.album)
    .sort((a,b) => b.date.localeCompare(a.date));
  const list = document.getElementById("history-list");
  document.getElementById("history-count").textContent = entries.length + " entrada" + (entries.length !== 1 ? "s" : "");
  if (!entries.length) {
    list.innerHTML = '<div class="empty-history"><strong>Nenhuma entrada ainda</strong>Avalie o álbum de hoje para começar seu histórico.</div>';
    return;
  }
  list.innerHTML = entries.map((e, i) => {
    const stars = Array.from({length:5},(_,j)=>`<span class="mini-star${j<e.rating?" on":""}">★</span>`).join("");
    const notePreview = e.notes ? `<div class="history-item-note">${e.notes}</div>` : "";
    return `<div class="history-item" data-idx="${i}">
      <div class="history-item-date">${formatDatePT(e.date)}</div>
      <div class="history-item-info">
        <div class="history-item-title">${e.album.title}</div>
        <div class="history-item-artist">${e.album.artist} · ${e.album.year}</div>
        ${notePreview}
      </div>
      <div class="history-item-rating">${e.rating ? stars : '<span class="unrated-tag">sem nota</span>'}</div>
    </div>`;
  }).join("");

  list.querySelectorAll(".history-item").forEach(item => {
    item.addEventListener("click", () => openModal(entries[+item.dataset.idx]));
  });
}

// MODAL
function openModal(entry) {
  document.getElementById("modal-date").textContent = formatDatePT(entry.date).toUpperCase();
  document.getElementById("modal-title").textContent = entry.album.title;
  document.getElementById("modal-artist").textContent = entry.album.artist + " · " + entry.album.year;
  const stars = document.getElementById("modal-stars");
  stars.innerHTML = entry.rating
    ? Array.from({length:5},(_,i)=>`<span class="modal-star${i<entry.rating?" on":""}">★</span>`).join("")
    : '<span style="font-size:13px;color:var(--ink-3);font-style:italic">sem avaliação</span>';
  document.getElementById("modal-notes-wrap").innerHTML = entry.notes
    ? `<div class="modal-notes">"${entry.notes}"</div>`
    : `<div class="modal-no-notes">nenhuma anotação</div>`;
  document.getElementById("modal").classList.add("open");
}
document.getElementById("modal-close").addEventListener("click", () => document.getElementById("modal").classList.remove("open"));
document.getElementById("modal").addEventListener("click", e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove("open"); });

// ALL ALBUMS
let allGenre = "all", allSearch = "";
function renderAll() {
  data = loadData();
  const filtered = ALBUMS.filter((a,i) => {
    const mg = allGenre === "all" || a.genre === allGenre;
    const q = allSearch.toLowerCase();
    const ms = !q || a.title.toLowerCase().includes(q) || a.artist.toLowerCase().includes(q);
    return mg && ms;
  });
  document.getElementById("all-count").textContent = filtered.length + " álbuns";
  const tbody = document.getElementById("all-tbody");
  const ratedDates = Object.values(data).map(e => {
    const idx = getDayIndex(e.date);
    return {idx, rating: e.rating};
  });
  tbody.innerHTML = filtered.map((a, i) => {
    const globalIdx = ALBUMS.indexOf(a);
    const ratedEntry = Object.values(data).find(e => ALBUMS.indexOf(e.album) === globalIdx || (e.album.title===a.title && e.album.artist===a.artist));
    let statusCell = '';
    if (ratedEntry) {
      const stars = Array.from({length:5},(_,j)=>`<span style="font-size:11px;color:${j<ratedEntry.rating?'var(--ink)':'var(--ink-3)'}">★</span>`).join("");
      statusCell = ratedEntry.rating ? stars : '<span style="font-size:11px;color:var(--ink-3);font-style:italic">ouvido</span>';
    }
    return `<tr>
      <td>${i+1}</td>
      <td class="td-title">${a.title}</td>
      <td class="td-artist">${a.artist}</td>
      <td class="td-year">${a.year}</td>
      <td class="td-genre"><span class="genre-pill ${GENRE_CLASSES[a.genre]}">${GENRE_LABELS[a.genre]}</span></td>
      <td class="td-status">${statusCell}</td>
    </tr>`;
  }).join("");
}

document.getElementById("all-search").addEventListener("input", e => {
  allSearch = e.target.value; renderAll();
});
document.querySelectorAll(".gf-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".gf-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    allGenre = btn.dataset.genre;
    renderAll();
  });
});
